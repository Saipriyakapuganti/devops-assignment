name: DevOps CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # Checkout the code
      # -------------------------
      - name: Checkout Code
        uses: actions/checkout@v3

      # -------------------------
      # Setup Node.js
      # -------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # -------------------------
      # Install Dependencies
      # -------------------------
      - name: Install Dependencies
        run: npm install

      # -------------------------
      # Run ESLint
      # -------------------------
      - name: Run ESLint
        run: npm run lint

      # -------------------------
      # Run Tests
      # -------------------------
      - name: Run Tests with Coverage
        run: npm run test:coverage

      # -------------------------
      # SonarCloud Scan (optional)
      # -------------------------
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # -------------------------
      # Build React App
      # -------------------------
      - name: Run Build
        run: npm run build

      # -------------------------
      # Docker: Build & Push Image
      # -------------------------
      - name: Build Docker Image
        run: docker build -t devops-app .

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Tag and Push Docker Image
        run: |
          docker tag devops-app ${{ secrets.DOCKER_USERNAME }}/devops-app:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/devops-app:latest

      # -------------------------
      # Setup SSH to EC2
      # -------------------------
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      # -------------------------
      # Install Ansible & Run Playbook
      # -------------------------
      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible

      - name: Run Ansible Playbook
        run: ansible-playbook -i ansible/inventory.ini ansible/playbook.yml
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          ANSIBLE_HOST_KEY_CHECKING: False
